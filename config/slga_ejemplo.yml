# Datos de ejemplo para probar el dashboard SLGA sin tener que cargar información
# real primero. Cárgalos con: python -m src.slga.cli seed-ejemplo
# Reemplázalos por los datos reales de tu municipalidad cuando estés listo
# (puedes editar este archivo directamente o usar los comandos *-add de la CLI).

