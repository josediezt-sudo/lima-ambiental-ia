# Datos de ejemplo para probar el dashboard SLGA sin tener que cargar información
# real primero. Cárgalos con: python -m src.slga.cli seed-ejemplo
#
# Cada item lleva un campo `distrito` (nombre exacto de la tabla `distritos` —
# usa "Lima Metropolitana" para instrumentos/CAM de ámbito provincial). Aquí se
# usan tres gobiernos locales a modo de ejemplo (Lima Metropolitana, San Isidro,
# San Juan de Lurigancho) para mostrar el modelo multi-distrital funcionando;
# reemplázalos por los datos reales de cada uno de los 44 cuando estés listo.

instrumentos:
  - distrito: "Lima Metropolitana"
    tipo: politica_ambiental_local
    nombre: "Política Ambiental Local 2024-2030"
    estado: vigente
    norma_aprobacion: "Ordenanza N° 001-2024-MML"
    fecha_aprobacion: "2024-02-15"
    fecha_revision_prevista: "2030-02-15"
    responsable: "Gerencia de Servicios a la Ciudad y Gestión Ambiental (MML)"

  - distrito: "Lima Metropolitana"
    tipo: diagnostico_ambiental_local
    nombre: "Diagnóstico Ambiental Local (DAL) 2023 — Lima Metropolitana"
    estado: vigente
    fecha_aprobacion: "2023-11-30"
    fecha_revision_prevista: "2027-11-30"

  - distrito: "Lima Metropolitana"
    tipo: plan_accion_ambiental_local
    nombre: "Plan de Acción Ambiental Local (PAAL) 2024-2026 — Lima Metropolitana"
    estado: vigente
    fecha_aprobacion: "2024-03-01"
    fecha_revision_prevista: "2026-12-31"

  - distrito: "Lima Metropolitana"
    tipo: planefa
    nombre: "PLANEFA 2026 — Lima Metropolitana"
    estado: vigente
    fecha_aprobacion: "2026-01-15"
    fecha_revision_prevista: "2026-12-31"

  - distrito: "San Isidro"
    tipo: agenda_ambiental_local
    nombre: "Agenda Ambiental Local 2025-2026 — San Isidro"
    estado: en_elaboracion
    fecha_revision_prevista: "2026-08-31"
    responsable: "CAM San Isidro"

  - distrito: "San Juan de Lurigancho"
    tipo: pigars
    nombre: "Plan Integral de Gestión Ambiental de Residuos Sólidos — SJL"
    estado: desactualizado
    fecha_aprobacion: "2018-05-20"
    fecha_revision_prevista: "2026-09-30"
    notas: "Pendiente actualizar bajo el marco del Decreto Legislativo 1278"

cam_integrantes:
  - distrito: "Lima Metropolitana"
    institucion: "Municipalidad Metropolitana de Lima (Alcaldía)"
    sector: publico
    representante: "Alcalde/sa"
    cargo: "Presidencia CAM"
    fecha_incorporacion: "2023-01-01"
  - distrito: "Lima Metropolitana"
    institucion: "Gerencia de Servicios a la Ciudad y Gestión Ambiental"
    sector: publico
    cargo: "Secretaría Técnica"
    fecha_incorporacion: "2023-01-01"
  - distrito: "San Isidro"
    institucion: "Municipalidad de San Isidro (Alcaldía)"
    sector: publico
    cargo: "Presidencia CAM"
    fecha_incorporacion: "2023-01-01"
  - distrito: "San Isidro"
    institucion: "Cámara de Comercio local"
    sector: privado
    fecha_incorporacion: "2023-02-01"
  - distrito: "San Isidro"
    institucion: "Asociación de vecinos"
    sector: sociedad_civil
    fecha_incorporacion: "2023-02-01"

cam_sesiones:
