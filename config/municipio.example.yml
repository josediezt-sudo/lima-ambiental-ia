# Copia este archivo a config/municipio.yml y personalízalo.
# config/municipio.yml está en .gitignore: cada municipalidad mantiene su propia
# configuración sin tener que tocar el código ni el repositorio compartido.

municipalidad:
  nombre: "Municipalidad Metropolitana de Lima"
  tipo: provincial          # "provincial" o "distrital"
  departamento: Lima
  provincia: Lima
  distrito: Lima             # solo aplica si tipo=distrital
  ubigeo: "150101"

monitoreo:
  # Centro y radio usados para buscar estaciones OpenAQ cercanas (ver src/ingest/openaq_aire.py)
  lat: -12.0464
  lon: -77.0428
  radio_m: 30000

comision_ambiental_municipal:
  nombre: "Comisión Ambiental Municipal de Lima Metropolitana"
  ordenanza_creacion: ""       # nro de ordenanza que crea la CAM, si se conoce
  sesiones_minimas_anuales: 4  # referencia usada como meta en el dashboard SLGA

gals:
  nivel_objetivo: "GALS I"     # "GALS I" o "GALS II" — ver docs/slga.md
